---
grafana_defaults:
  user: grafana
  group: grafana
  port: 3000
  container:
    name: grafana/grafana
    tag: latest
    registry: docker.io
prometheus_defaults:
  user: prometheus
  group: prometheus
  port: 9090
  container:
    name: prom/prometheus
    tag: latest
    registry: docker.io
  scrape_configs: []
pushgateway_defaults:
  user: pushgateway
  group: pushgateway
  port: 9091
  container:
    name: prom/pushgateway
    tag: latest
    registry: docker.io
